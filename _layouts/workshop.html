---
layout: default
---
<article class="page-shell">
  <div class="container narrow">
    <div class="page-heading">
      <p class="eyebrow">taller / curso</p>
      <h1>{{ page.title }}</h1>
      <p class="lead">{{ page.summary }}</p>
    </div>

    <div class="meta-grid">
      <div class="meta-card"><strong>Fecha</strong><span>{{ page.date | date: "%d/%m/%Y" }}</span></div>
      <div class="meta-card"><strong>Formato</strong><span>{{ page.format }}</span></div>
      <div class="meta-card"><strong>Audiencia</strong><span>{{ page.audience }}</span></div>
      <div class="meta-card"><strong>Estado</strong><span>{{ page.status }}</span></div>
    </div>

    <div class="content prose">
      {{ content }}
    </div>

    <p><a class="button ghost" href="{{ '/talleres/' | relative_url }}">← Volver a talleres</a></p>
  </div>
</article>
