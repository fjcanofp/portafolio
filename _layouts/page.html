---
layout: default
---
<section class="page-shell">
  <div class="container narrow">
    {% if page.title %}
      <div class="page-heading">
        <p class="eyebrow">{{ page.eyebrow | default: 'documento' }}</p>
        <h1>{{ page.title }}</h1>
        {% if page.intro %}<p class="lead">{{ page.intro }}</p>{% endif %}
      </div>
    {% endif %}
    <article class="content prose">
      {{ content }}
    </article>
  </div>
</section>
